coverage:
  status:
    project:
      default:
        target: 45%
        threshold: 0%
    patch:
      default:
        target: auto

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "**/*_test.c"
  - "libbubblehub/tests/**"

component_management:
  default_rules:
    statuses:
      - type: project
        target: 45%
  individual_components:
    - component_id: libbubblehub
      name: libbubblehub
      paths:
        - libbubblehub/**
    - component_id: bubblehub
      name: bubblehub
      paths:
        - bubblehub/**
