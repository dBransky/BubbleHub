[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ageos"
version = "0.1.0"
description = "AgeOS MVP CLI, sandbox, local model scheduler, and Python integrations."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AgeOS" }]
dependencies = [
  "huggingface-hub>=0.23",
  "pyyaml>=6.0",
  "requests>=2.31",
  "rich>=13.7",
  "typer>=0.12",
  "pytest>=8.0",
]

[project.optional-dependencies]
dev = [
  "pre-commit>=3.7",
  "pytest-cov>=5.0",
  "ruff>=0.4",
]
examples = []
vllm = [
  "vllm>=0.5",
]
langchain = [
  "langchain-core>=0.2,<0.4",
]

[project.scripts]
ageos = "ageos.cli.main:run_cli"
ageos-node = "ageos.node.daemon:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["ageos*"]

[tool.setuptools.package-data]
ageos = ["config/*.yaml"]

[tool.setuptools.data-files]
"share/ageos/libageos" = [
  "libageos/ageos_sandbox_main.c",
  "libageos/hw_detect.c",
  "libageos/http_proxy.c",
  "libageos/http_proxy_test.c",
  "libageos/landlock.c",
  "libageos/limits.c",
  "libageos/log.c",
  "libageos/meson.build",
  "libageos/overfs.c",
  "libageos/scheduler.c",
  "libageos/sandbox.c",
]
"share/ageos/libageos/include/ageos" = [
  "libageos/include/ageos/hw.h",
  "libageos/include/ageos/http_proxy.h",
  "libageos/include/ageos/limits.h",
  "libageos/include/ageos/log.h",
  "libageos/include/ageos/overfs.h",
  "libageos/include/ageos/scheduler.h",
  "libageos/include/ageos/sandbox.h",
]
"share/ageos/scripts" = [
  "scripts/build.sh",
  "scripts/create-rootfs.sh",
  "scripts/install.ps1",
  "scripts/install.sh",
  "scripts/install-deps.sh",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["."]
markers = [
  "integration: tests that require a built AgeOS runtime and local inference backend",
]

[tool.ruff]
target-version = "py310"
line-length = 150

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = []

[tool.ruff.lint.per-file-ignores]
