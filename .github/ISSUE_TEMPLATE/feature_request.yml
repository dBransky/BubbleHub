name: Feature Request
description: Suggest a new feature or improvement for BubbleHub Runtime.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement! Please provide as much detail as possible to help us understand and evaluate your request.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Describe it clearly.
      placeholder: "I'm always running into a situation where... / It's currently not possible to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you have considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of BubbleHub Runtime does this request relate to?
      options:
        - Runtime core
        - Inference / model backend
        - Sandbox / security
        - Docker / containerisation
        - CLI / tooling
        - Python API / libbubblehub
        - Documentation
        - CI / testing
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or references that support the request.
