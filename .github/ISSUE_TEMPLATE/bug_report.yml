name: Bug Report
description: Report a bug or unexpected behaviour in BubbleHub Runtime.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill in as much detail as possible so we can triage and reproduce the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide the minimal steps needed to reproduce the issue.
      placeholder: |
        1. Run `...`
        2. Call `...`
        3. Observe `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide relevant details about your environment.
      placeholder: |
        - OS: (e.g. Ubuntu 24.04, macOS 14, Windows 11)
        - BubbleHub Runtime version: (e.g. v0.1.0 or commit SHA)
        - Python version: (e.g. 3.12)
        - Docker version (if applicable):
        - GPU / hardware (if relevant):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Output
      description: Paste any relevant log output here. This will be automatically formatted as code.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that may help us understand the issue.
