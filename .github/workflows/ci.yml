name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install "pre-commit>=3.7"

      - name: Run linters (pre-commit)
        run: pre-commit run --all-files

  unit-tests:
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build unit test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: unit-test
          load: true
          tags: bubblehub:unit-${{ github.sha }}
          cache-from: type=gha,scope=unit-test
          cache-to: type=gha,mode=max,scope=unit-test
          build-args: |
            MESON_COVERAGE=true

      - name: Run unit tests with coverage
        run: |
          mkdir -p .ci-artifacts/coverage
          docker run --rm \
            --privileged \
            --security-opt seccomp=unconfined \
            -v "${{ github.workspace }}/.ci-artifacts/coverage:/coverage-out" \
            bubblehub:unit-${{ github.sha }} \
            scripts/ci/run-unit-tests-coverage.sh

      - name: Publish coverage summary
        if: always()
        run: scripts/ci/write-coverage-summary.sh .ci-artifacts/coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: .ci-artifacts/coverage/python/coverage.xml,.ci-artifacts/coverage/c/coverage.xml
          disable_search: true
          fail_ci_if_error: true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          if-no-files-found: ignore
          include-hidden-files: true
          path: .ci-artifacts/coverage/

  integration-tests:
    runs-on: ubuntu-22.04
    needs: unit-tests
    timeout-minutes: 60
    env:
      BUBBLEHUB_RUN_INTEGRATION: "1"
      BUBBLEHUB_CACHE: /cache/bubblehub
      BUBBLEHUB_MODELS_CONFIG: /cache/bubblehub/ci-models.yaml
      BUBBLEHUB_INTEGRATION_WORKSPACE_DIR: /cache/bubblehub/integration-workspaces
      BUBBLEHUB_LLAMA_CTX_SIZE: "512"
      BUBBLEHUB_MAX_OUTPUT_TOKENS: "32"
      NO_PROXY: 127.0.0.1,localhost
      OPENCLAW_CACHE_DIR: /cache/openclaw
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: .bubblehub-cache
          key: bubblehub-models-${{ runner.os }}-${{ hashFiles('scripts/ci/write-ci-model-config.sh') }}
          restore-keys: |
            bubblehub-models-${{ runner.os }}-

      - name: Restore OpenClaw source cache
        uses: actions/cache@v4
        with:
          path: .openclaw-cache
          key: openclaw-source-${{ runner.os }}-${{ hashFiles('scripts/ci/prepare-openclaw.sh') }}
          restore-keys: |
            openclaw-source-${{ runner.os }}-

      - name: Prepare cache and artifact directories
        run: |
          mkdir -p .bubblehub-cache/integration-workspaces .openclaw-cache .ci-artifacts
          chmod -R a+rwX .bubblehub-cache .openclaw-cache

      - name: Build integration test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: integration-test
          load: true
          tags: bubblehub:integration-${{ github.sha }}
          cache-from: |
            type=gha,scope=integration-test
            type=gha,scope=unit-test
          cache-to: type=gha,mode=max,scope=integration-test

      - name: Run integration tests
        run: |
          set +e
          docker rm -f bubblehub-integration >/dev/null 2>&1 || true
          docker run \
            --name bubblehub-integration \
            --privileged \
            --security-opt seccomp=unconfined \
            -e BUBBLEHUB_RUN_INTEGRATION \
            -e BUBBLEHUB_CACHE \
            -e BUBBLEHUB_MODELS_CONFIG \
            -e BUBBLEHUB_INTEGRATION_WORKSPACE_DIR \
            -e BUBBLEHUB_LLAMA_CTX_SIZE \
            -e BUBBLEHUB_MAX_OUTPUT_TOKENS \
            -e NO_PROXY \
            -e OPENCLAW_CACHE_DIR \
            -v "${{ github.workspace }}/.bubblehub-cache:/cache/bubblehub" \
            -v "${{ github.workspace }}/.openclaw-cache:/cache/openclaw" \
            bubblehub:integration-${{ github.sha }}
          status=$?

          mkdir -p .ci-artifacts
          docker cp bubblehub-integration:/tmp .ci-artifacts/tmp >/dev/null 2>&1 || true
          docker cp bubblehub-integration:/src/examples .ci-artifacts/examples >/dev/null 2>&1 || true
          docker cp bubblehub-integration:/cache/bubblehub/integration-workspaces .ci-artifacts/integration-workspaces >/dev/null 2>&1 || true
          docker rm -f bubblehub-integration >/dev/null 2>&1 || true
          exit "$status"

      - name: Upload integration logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          if-no-files-found: ignore
          include-hidden-files: true
          path: |
            .ci-artifacts/tmp/bubblehub-llama-*.log
            .ci-artifacts/tmp/openclaw/*.log
            .ci-artifacts/examples/**/.bubblehub/**/.openclaw/**/*.jsonl
            .ci-artifacts/examples/**/.bubblehub/**/.openclaw/**/*.json
            .ci-artifacts/integration-workspaces/**/.bubblehub/**/.openclaw/**/*.jsonl
            .ci-artifacts/integration-workspaces/**/.bubblehub/**/.openclaw/**/*.json

      - name: Clean transient integration workspaces
        if: always()
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/.bubblehub-cache:/cache/bubblehub" \
            alpine:3.20 \
            rm -rf /cache/bubblehub/integration-workspaces
          mkdir -p .bubblehub-cache/integration-workspaces
          chmod -R a+rwX .bubblehub-cache/integration-workspaces
