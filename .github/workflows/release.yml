name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  unit-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build unit test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: unit-test
          load: true
          tags: bubblehub:unit-${{ github.sha }}
          cache-from: type=gha,scope=unit-test
          cache-to: type=gha,mode=max,scope=unit-test
          build-args: |
            MESON_COVERAGE=true

      - name: Run unit tests with coverage
        run: |
          mkdir -p .ci-artifacts/coverage
          docker run --rm \
            --privileged \
            --security-opt seccomp=unconfined \
            -v "${{ github.workspace }}/.ci-artifacts/coverage:/coverage-out" \
            bubblehub:unit-${{ github.sha }} \
            scripts/ci/run-unit-tests-coverage.sh

      - name: Publish coverage summary
        if: always()
        run: scripts/ci/write-coverage-summary.sh .ci-artifacts/coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          if-no-files-found: ignore
          include-hidden-files: true
          path: .ci-artifacts/coverage/

  integration-tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      BUBBLEHUB_RUN_INTEGRATION: "1"
      BUBBLEHUB_CACHE: /cache/bubblehub
      BUBBLEHUB_MODELS_CONFIG: /cache/bubblehub/ci-models.yaml
      BUBBLEHUB_INTEGRATION_WORKSPACE_DIR: /cache/bubblehub/integration-workspaces
      BUBBLEHUB_LLAMA_CTX_SIZE: "512"
      BUBBLEHUB_MAX_OUTPUT_TOKENS: "32"
      NO_PROXY: 127.0.0.1,localhost
      OPENCLAW_CACHE_DIR: /cache/openclaw
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: .bubblehub-cache
          key: bubblehub-models-${{ runner.os }}-${{ hashFiles('scripts/ci/write-ci-model-config.sh') }}
          restore-keys: |
            bubblehub-models-${{ runner.os }}-

      - name: Restore OpenClaw source cache
        uses: actions/cache@v4
        with:
          path: .openclaw-cache
          key: openclaw-source-${{ runner.os }}-${{ hashFiles('scripts/ci/prepare-openclaw.sh') }}
          restore-keys: |
            openclaw-source-${{ runner.os }}-

      - name: Prepare cache and artifact directories
        run: |
          mkdir -p .bubblehub-cache/integration-workspaces .openclaw-cache .ci-artifacts/coverage/integration
          chmod -R a+rwX .bubblehub-cache .openclaw-cache

      - name: Build integration test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: integration-test
          load: true
          tags: bubblehub:integration-${{ github.sha }}
          build-args: |
            MESON_COVERAGE=true
          cache-from: |
            type=gha,scope=integration-test
            type=gha,scope=unit-test
          cache-to: type=gha,mode=max,scope=integration-test

      - name: Run integration tests
        run: |
          set +e
          docker rm -f bubblehub-integration >/dev/null 2>&1 || true
          docker run \
            --name bubblehub-integration \
            --privileged \
            --security-opt seccomp=unconfined \
            -e BUBBLEHUB_RUN_INTEGRATION \
            -e BUBBLEHUB_CACHE \
            -e BUBBLEHUB_MODELS_CONFIG \
            -e BUBBLEHUB_INTEGRATION_WORKSPACE_DIR \
            -e BUBBLEHUB_LLAMA_CTX_SIZE \
            -e BUBBLEHUB_MAX_OUTPUT_TOKENS \
            -e NO_PROXY \
            -e OPENCLAW_CACHE_DIR \
            -v "${{ github.workspace }}/.bubblehub-cache:/cache/bubblehub" \
            -v "${{ github.workspace }}/.openclaw-cache:/cache/openclaw" \
            -v "${{ github.workspace }}/.ci-artifacts/coverage/integration:/coverage-out" \
            bubblehub:integration-${{ github.sha }} \
            scripts/ci/run-integration-tests-coverage.sh
          status=$?

          mkdir -p .ci-artifacts
          docker cp bubblehub-integration:/tmp .ci-artifacts/tmp >/dev/null 2>&1 || true
          docker cp bubblehub-integration:/src/examples .ci-artifacts/examples >/dev/null 2>&1 || true
          docker cp bubblehub-integration:/cache/bubblehub/integration-workspaces .ci-artifacts/integration-workspaces >/dev/null 2>&1 || true
          docker rm -f bubblehub-integration >/dev/null 2>&1 || true
          exit "$status"

      - name: Upload integration coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-reports
          if-no-files-found: ignore
          include-hidden-files: true
          path: .ci-artifacts/coverage/integration/

      - name: Upload integration logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          if-no-files-found: ignore
          include-hidden-files: true
          path: |
            .ci-artifacts/tmp/bubblehub-llama-*.log
            .ci-artifacts/tmp/openclaw/*.log
            .ci-artifacts/examples/**/.bubblehub/**/.openclaw/**/*.jsonl
            .ci-artifacts/examples/**/.bubblehub/**/.openclaw/**/*.json
            .ci-artifacts/integration-workspaces/**/.bubblehub/**/.openclaw/**/*.jsonl
            .ci-artifacts/integration-workspaces/**/.bubblehub/**/.openclaw/**/*.json

      - name: Clean transient integration workspaces
        if: always()
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/.bubblehub-cache:/cache/bubblehub" \
            alpine:3.20 \
            rm -rf /cache/bubblehub/integration-workspaces
          mkdir -p .bubblehub-cache/integration-workspaces
          chmod -R a+rwX .bubblehub-cache/integration-workspaces

  codecov:
    name: Upload coverage to Codecov
    runs-on: ubuntu-22.04
    needs:
      - unit-tests
      - integration-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: .ci-artifacts/coverage

      - uses: actions/download-artifact@v4
        with:
          name: integration-coverage-reports
          path: .ci-artifacts/coverage/integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: .ci-artifacts/coverage/python/coverage.xml,.ci-artifacts/coverage/c/coverage.xml,.ci-artifacts/coverage/integration/c/coverage.xml
          disable_search: true
          fail_ci_if_error: true

  publish-runtime-image:
    runs-on: ubuntu-22.04
    needs: codecov
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,prefix=sha-

      - name: Build and push runtime image
        id: build-runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=runtime
            type=gha,scope=integration-test
            type=gha,scope=unit-test
          cache-to: type=gha,mode=max,scope=runtime

      - name: Write image digest artifact
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          DIGEST: ${{ steps.build-runtime.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          mkdir -p container-image
          {
            echo "Image: ${IMAGE}"
            echo "Digest: ${DIGEST}"
            echo
            echo "Tags:"
            printf '%s\n' "${TAGS}" | sed 's/^/- /'
          } > container-image/container-image.txt

      - uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: container-image/container-image.txt

  windows-control-center:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build BubbleHub Windows Control Center
        shell: pwsh
        run: |
          npm install
          python scripts/ci/write-windows-icon.py app/icons/icon.ico
          npm run app:build
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          New-Item -ItemType Directory -Force -Path windows-control-center | Out-Null
          Copy-Item app/target/release/bubblehub-control-center.exe "windows-control-center/BubbleHub-$version-control-center-x64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-control-center
          path: windows-control-center/*

  release-artifacts:
    runs-on: ubuntu-22.04
    needs:
      - publish-runtime-image
      - windows-control-center
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: container-image
          path: release-assets

      - uses: actions/download-artifact@v4
        with:
          name: windows-control-center
          path: release-assets

      - name: Install release packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis python3 librsvg2-bin

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build GitHub Release assets
        env:
          BUBBLEHUB_REPO: ${{ github.repository }}
          BUBBLEHUB_RUNTIME_IMAGE: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
        run: |
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#v}"
          docker pull "$BUBBLEHUB_RUNTIME_IMAGE"
          git archive --format=tar.gz --prefix="bubblehub-${GITHUB_REF_NAME}/" --output=release-assets/bubblehub-source.tar.gz HEAD
          cp scripts/install.sh release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          scripts/package-release.sh "$GITHUB_REF_NAME" release-assets
          cd release-assets
          sha256sum \
            bubblehub-source.tar.gz \
            install.sh \
            install.ps1 \
            "BubbleHub-${VERSION}-x64.deb" \
            "BubbleHub-${VERSION}-x64.exe" \
            "BubbleHub-${VERSION}-control-center-x64.exe" \
            container-image.txt \
            > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: github-release-assets
          path: release-assets/*

  validate-release-artifacts:
    runs-on: ubuntu-22.04
    needs: release-artifacts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: github-release-assets
          path: release-assets

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl file gnupg
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /usr/share/keyrings/microsoft-prod.gpg >/dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/repos/microsoft-ubuntu-jammy-prod jammy main" | sudo tee /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y powershell

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release scripts, installers, and packages
        env:
          BUBBLEHUB_RUNTIME_IMAGE: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
        run: ./scripts/ci/validate-release-artifacts.sh release-assets

  github-release:
    runs-on: ubuntu-22.04
    needs:
      - release-artifacts
      - validate-release-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: github-release-assets
          path: release-assets

      - name: Select release notes
        id: release-notes
        run: |
          notes_path=".github/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "$notes_path" ]]; then
            echo "Using Cursor-authored release notes from ${notes_path}"
            echo "body_path=${notes_path}" >> "$GITHUB_OUTPUT"
            echo "has_custom_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No ${notes_path} found; using GitHub generated release notes."
            echo "has_custom_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release with Cursor notes
        if: steps.release-notes.outputs.has_custom_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/bubblehub-source.tar.gz
            release-assets/install.sh
            release-assets/install.ps1
            release-assets/BubbleHub-*-x64.deb
            release-assets/BubbleHub-*-x64.exe
            release-assets/BubbleHub-*-control-center-x64.exe
            release-assets/container-image.txt
            release-assets/SHA256SUMS
          body_path: ${{ steps.release-notes.outputs.body_path }}
          name: BubbleHub ${{ github.ref_name }}

      - name: Create GitHub Release with generated notes
        if: steps.release-notes.outputs.has_custom_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/bubblehub-source.tar.gz
            release-assets/install.sh
            release-assets/install.ps1
            release-assets/BubbleHub-*-x64.deb
            release-assets/BubbleHub-*-x64.exe
            release-assets/BubbleHub-*-control-center-x64.exe
            release-assets/container-image.txt
            release-assets/SHA256SUMS
          generate_release_notes: true
          name: BubbleHub ${{ github.ref_name }}

  release-smoke-assets:
    runs-on: ubuntu-22.04
    needs: github-release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: github-release-assets
          path: current-release-assets

      - uses: docker/setup-buildx-action@v3

      - name: Install release packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis python3 librsvg2-bin

      - name: Build release install smoke assets
        env:
          BUBBLEHUB_REPO: ${{ github.repository }}
          BUBBLEHUB_CURRENT_ASSETS_DIR: ${{ github.workspace }}/current-release-assets
          BUBBLEHUB_PREVIOUS_VERSION_TAG: v0.0.0+release.smoke.1
        run: bash scripts/ci/build-release-smoke-assets.sh .ci-artifacts/release-smoke-assets

      - name: Inject previous Windows Control Center smoke asset
        shell: bash
        run: |
          set -euo pipefail
          apps=(current-release-assets/BubbleHub-*-control-center-x64.exe)
          source="${apps[0]}"
          tag="$(cat .ci-artifacts/release-smoke-assets/previous/VERSION_TAG)"
          version="${tag#v}"
          cp "$source" ".ci-artifacts/release-smoke-assets/${tag}/BubbleHub-${version}-control-center-x64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: release-smoke-assets
          path: .ci-artifacts/release-smoke-assets/

  release-smoke-linux:
    runs-on: ubuntu-22.04
    needs: release-smoke-assets
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        method: [curl, apt]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: actions/download-artifact@v4
        with:
          name: release-smoke-assets
          path: release-smoke-assets

      - name: Validate Linux ${{ matrix.method }} release installation
        run: bash scripts/ci/run-linux-release-install-smoke.sh "${{ matrix.method }}" release-smoke-assets

  release-smoke-windows:
    # Self-hosted Windows runners for this job must have an interactive desktop,
    # WSL2/WSLg, a clean Ubuntu base distro, Python, and permission to import
    # disposable WSL distros for the installation smoke test.
    runs-on: [self-hosted, Windows, X64]
    needs: release-smoke-assets
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        method: [ps1, exe]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/download-artifact@v4
        with:
          name: release-smoke-assets
          path: release-smoke-assets

      - name: Validate Windows ${{ matrix.method }} release installation
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/ci/run-windows-release-install-smoke.ps1 -Method "${{ matrix.method }}" -AssetsDir release-smoke-assets

  discord-announcement:
    runs-on: ubuntu-22.04
    needs:
      - release-smoke-linux
      - release-smoke-windows
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Load GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" > release.json
          jq -r '.body // ""' release.json > release-body.md
          echo "name=$(jq -r '.name // "BubbleHub ${GITHUB_REF_NAME}"' release.json)" >> "$GITHUB_OUTPUT"
          echo "url=$(jq -r '.html_url' release.json)" >> "$GITHUB_OUTPUT"

      - name: Send release announcement to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_NAME: ${{ steps.release.outputs.name }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK}" ]]; then
            echo "DISCORD_WEBHOOK secret is required for release announcements." >&2
            exit 1
          fi

          body="$(head -c 1000 release-body.md)"
          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          jq -n \
            --arg name "$RELEASE_NAME" \
            --arg tag "$RELEASE_TAG" \
            --arg url "$RELEASE_URL" \
            --arg body "$body" \
            --arg timestamp "$timestamp" \
            '{
              "username": "BubbleHub Releases",
              "avatar_url": "https://BubbleHub.ai/logo.png",
              "embeds": [
                {
                  "title": ("🚀 " + $name),
                  "url": $url,
                  "description": "A new BubbleHub release is now available.",
                  "fields": [
                    {
                      "name": "Version",
                      "value": $tag,
                      "inline": true
                    },
                    {
                      "name": "Download",
                      "value": ("[GitHub Release](" + $url + ")"),
                      "inline": true
                    },
                    {
                      "name": "Release Notes",
                      "value": (
                        if ($body | length) > 0
                        then $body
                        else "See the release page for details."
                        end
                      )
                    }
                  ],
                  "footer": {
                    "text": "BubbleHub • One-click agent sandboxing and local LLM serving"
                  },
                  "timestamp": $timestamp
                }
              ]
            }' > payload.json

          curl \
            --fail \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$DISCORD_WEBHOOK"
