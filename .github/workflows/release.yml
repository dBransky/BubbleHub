name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  unit-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build unit test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: unit-test
          load: true
          tags: ageos-runtime:unit-${{ github.sha }}
          cache-from: type=gha,scope=unit-test
          cache-to: type=gha,mode=max,scope=unit-test

      - name: Run unit tests
        run: docker run --rm --privileged --security-opt seccomp=unconfined ageos-runtime:unit-${{ github.sha }}

  integration-tests:
    runs-on: ubuntu-22.04
    needs: unit-tests
    timeout-minutes: 60
    env:
      AGEOS_RUN_INTEGRATION: "1"
      AGEOS_CACHE: /cache/ageos
      AGEOS_MODELS_CONFIG: /cache/ageos/ci-models.yaml
      AGEOS_LLAMA_CTX_SIZE: "512"
      AGEOS_MAX_OUTPUT_TOKENS: "32"
      NO_PROXY: 127.0.0.1,localhost
      PNPM_HOME: /opt/pnpm
      OPENCLAW_CACHE_DIR: /cache/openclaw
      PNPM_STORE_DIR: /cache/openclaw/pnpm-store
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: .ageos-cache
          key: ageos-models-${{ runner.os }}-${{ hashFiles('scripts/ci/write-ci-model-config.sh') }}
          restore-keys: |
            ageos-models-${{ runner.os }}-

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: pnpm-openclaw-${{ runner.os }}-${{ hashFiles('scripts/ci/prepare-openclaw.sh') }}
          restore-keys: |
            pnpm-openclaw-${{ runner.os }}-

      - name: Prepare cache and artifact directories
        run: |
          mkdir -p .ageos-cache .pnpm-store .ci-artifacts

      - name: Build integration test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: integration-test
          load: true
          tags: ageos-runtime:integration-${{ github.sha }}
          cache-from: type=gha,scope=integration-test
          cache-to: type=gha,mode=max,scope=integration-test

      - name: Run integration tests
        run: |
          set +e
          docker rm -f ageos-integration >/dev/null 2>&1 || true
          docker run \
            --name ageos-integration \
            --privileged \
            --security-opt seccomp=unconfined \
            -e AGEOS_RUN_INTEGRATION \
            -e AGEOS_CACHE \
            -e AGEOS_MODELS_CONFIG \
            -e AGEOS_LLAMA_CTX_SIZE \
            -e AGEOS_MAX_OUTPUT_TOKENS \
            -e NO_PROXY \
            -e PNPM_HOME \
            -e OPENCLAW_CACHE_DIR \
            -e PNPM_STORE_DIR \
            -v "${{ github.workspace }}/.ageos-cache:/cache/ageos" \
            -v "${{ github.workspace }}/.pnpm-store:/cache/openclaw" \
            ageos-runtime:integration-${{ github.sha }}
          status=$?

          mkdir -p .ci-artifacts
          docker cp ageos-integration:/tmp .ci-artifacts/tmp >/dev/null 2>&1 || true
          docker cp ageos-integration:/src/examples .ci-artifacts/examples >/dev/null 2>&1 || true
          docker rm -f ageos-integration >/dev/null 2>&1 || true
          exit "$status"

      - name: Upload integration logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          if-no-files-found: ignore
          include-hidden-files: true
          path: |
            .ci-artifacts/tmp/ageos-llama-*.log
            .ci-artifacts/tmp/openclaw/*.log
            .ci-artifacts/examples/**/.ageos/**/.openclaw/**/*.jsonl
            .ci-artifacts/examples/**/.ageos/**/.openclaw/**/*.json

  publish-runtime-image:
    runs-on: ubuntu-22.04
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,prefix=sha-

      - name: Build and push runtime image
        id: build-runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime

      - name: Write image digest artifact
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          DIGEST: ${{ steps.build-runtime.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          mkdir -p container-image
          {
            echo "Image: ${IMAGE}"
            echo "Digest: ${DIGEST}"
            echo
            echo "Tags:"
            printf '%s\n' "${TAGS}" | sed 's/^/- /'
          } > container-image/container-image.txt

      - uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: container-image/container-image.txt

  release-artifacts:
    runs-on: ubuntu-22.04
    needs:
      - publish-runtime-image
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: container-image
          path: release-assets

      - name: Install release packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build GitHub Release assets
        env:
          AGEOS_REPO: ${{ github.repository }}
          AGEOS_RUNTIME_IMAGE: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
        run: |
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#v}"
          docker pull "$AGEOS_RUNTIME_IMAGE"
          git archive --format=tar.gz --prefix="ageos-${GITHUB_REF_NAME}/" --output=release-assets/ageos-source.tar.gz HEAD
          cp scripts/install.sh release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          scripts/package-release.sh "$GITHUB_REF_NAME" release-assets
          cd release-assets
          sha256sum \
            ageos-source.tar.gz \
            install.sh \
            install.ps1 \
            "AgeOS-${VERSION}-x64.deb" \
            "AgeOS-${VERSION}-x64.exe" \
            container-image.txt \
            > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: github-release-assets
          path: release-assets/*

  github-release:
    runs-on: ubuntu-22.04
    needs: release-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: github-release-assets
          path: release-assets

      - name: Select release notes
        id: release-notes
        run: |
          notes_path=".github/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "$notes_path" ]]; then
            echo "Using Cursor-authored release notes from ${notes_path}"
            echo "body_path=${notes_path}" >> "$GITHUB_OUTPUT"
            echo "has_custom_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No ${notes_path} found; using GitHub generated release notes."
            echo "has_custom_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release with Cursor notes
        if: steps.release-notes.outputs.has_custom_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/ageos-source.tar.gz
            release-assets/install.sh
            release-assets/install.ps1
            release-assets/AgeOS-*-x64.deb
            release-assets/AgeOS-*-x64.exe
            release-assets/container-image.txt
            release-assets/SHA256SUMS
          body_path: ${{ steps.release-notes.outputs.body_path }}
          name: AgeOS ${{ github.ref_name }}

      - name: Create GitHub Release with generated notes
        if: steps.release-notes.outputs.has_custom_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/ageos-source.tar.gz
            release-assets/install.sh
            release-assets/install.ps1
            release-assets/AgeOS-*-x64.deb
            release-assets/AgeOS-*-x64.exe
            release-assets/container-image.txt
            release-assets/SHA256SUMS
          generate_release_notes: true
          name: AgeOS ${{ github.ref_name }}

  discord-announcement:
    runs-on: ubuntu-22.04
    needs: github-release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Load GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" > release.json
          jq -r '.body // ""' release.json > release-body.md
          echo "name=$(jq -r '.name // "AgeOS ${GITHUB_REF_NAME}"' release.json)" >> "$GITHUB_OUTPUT"
          echo "url=$(jq -r '.html_url' release.json)" >> "$GITHUB_OUTPUT"

      - name: Send release announcement to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_NAME: ${{ steps.release.outputs.name }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK}" ]]; then
            echo "DISCORD_WEBHOOK secret is required for release announcements." >&2
            exit 1
          fi

          body="$(head -c 1000 release-body.md)"
          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          jq -n \
            --arg name "$RELEASE_NAME" \
            --arg tag "$RELEASE_TAG" \
            --arg url "$RELEASE_URL" \
            --arg body "$body" \
            --arg timestamp "$timestamp" \
            '{
              "username": "AgeOS Releases",
              "avatar_url": "https://ageos-labs.com/logo.png",
              "embeds": [
                {
                  "title": ("🚀 " + $name),
                  "url": $url,
                  "description": "A new AgeOS release is now available.",
                  "fields": [
                    {
                      "name": "Version",
                      "value": $tag,
                      "inline": true
                    },
                    {
                      "name": "Download",
                      "value": ("[GitHub Release](" + $url + ")"),
                      "inline": true
                    },
                    {
                      "name": "Release Notes",
                      "value": (
                        if ($body | length) > 0
                        then $body
                        else "See the release page for details."
                        end
                      )
                    }
                  ],
                  "footer": {
                    "text": "AgeOS • One-click agent sandboxing and local LLM serving"
                  },
                  "timestamp": $timestamp
                }
              ]
            }' > payload.json

          curl \
            --fail \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$DISCORD_WEBHOOK"
