name: discord-notifications

on:
  issues:
    types: [opened, closed]
  push:
    branches: [main]

permissions:
  issues: read
  pull-requests: read
  contents: read

jobs:
  notify-issue:
    if: github.event_name == 'issues' && github.event.issue.pull_request == null
    runs-on: ubuntu-22.04
    steps:
      - name: Send issue update to Discord
        env:
          GH_TOKEN: ${{ github.token }}
          DISCORD_WEBHOOK_FEATURE_REQUESTS: ${{ secrets.DISCORD_WEBHOOK_FEATURE_REQUESTS }}
          DISCORD_WEBHOOK_BUGS: ${{ secrets.DISCORD_WEBHOOK_BUGS }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail

          issue_json="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}")"
          issue_type="$(echo "$issue_json" | jq -r '.type.name // ""' | tr '[:upper:]' '[:lower:]')"
          labels="$(echo "$issue_json" | jq -r '[.labels[].name | ascii_downcase] | join(" ")')"
          ISSUE_TITLE="$(echo "$issue_json" | jq -r '.title')"
          ISSUE_URL="$(echo "$issue_json" | jq -r '.html_url')"
          ISSUE_USER="$(echo "$issue_json" | jq -r '.user.login')"
          ISSUE_BODY="$(echo "$issue_json" | jq -r '.body // ""')"

          route=""
          if [[ "$issue_type" == *feature* ]]; then
            route="feature"
          elif [[ "$issue_type" == *bug* ]]; then
            route="bug"
          elif [[ "$labels" == *feature* ]]; then
            route="feature"
          elif [[ "$labels" == *bug* ]]; then
            route="bug"
          fi

          if [[ -z "$route" ]]; then
            echo "Issue #${ISSUE_NUMBER} has no feature or bug type; skipping Discord notification."
            exit 0
          fi

          case "$route" in
            feature)
              webhook="${DISCORD_WEBHOOK_FEATURE_REQUESTS:-}"
              channel_label="Feature Requests"
              ;;
            bug)
              webhook="${DISCORD_WEBHOOK_BUGS:-}"
              channel_label="Bugs"
              ;;
          esac

          if [[ -z "$webhook" ]]; then
            echo "Discord webhook secret is required for ${channel_label} notifications." >&2
            exit 1
          fi

          if [[ "$ISSUE_ACTION" == "opened" ]]; then
            action_label="opened"
            color="5763719"
          else
            action_label="closed"
            color="9807270"
          fi

          body_preview="$(printf '%s' "${ISSUE_BODY:-}" | head -c 1000)"
          title_preview="$(printf '%s' "${ISSUE_TITLE:-}" | head -c 256)"
          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          jq -n \
            --arg title "$title_preview" \
            --arg url "$ISSUE_URL" \
            --arg action "$action_label" \
            --arg channel "$channel_label" \
            --arg user "$ISSUE_USER" \
            --arg number "$ISSUE_NUMBER" \
            --arg body "$body_preview" \
            --arg timestamp "$timestamp" \
            --argjson color "$color" \
            '{
              "username": "BubbleHub GitHub",
              "avatar_url": "https://BubbleHub.ai/logo.png",
              "embeds": [
                {
                  "title": ("Issue #" + $number + " " + $action),
                  "url": $url,
                  "description": $title,
                  "color": $color,
                  "fields": [
                    {
                      "name": "Author",
                      "value": $user,
                      "inline": true
                    },
                    {
                      "name": "Channel",
                      "value": $channel,
                      "inline": true
                    },
                    {
                      "name": "Description",
                      "value": (
                        if ($body | length) > 0
                        then $body
                        else "No description provided."
                        end
                      )
                    }
                  ],
                  "footer": {
                    "text": "BubbleHub • GitHub Issues"
                  },
                  "timestamp": $timestamp
                }
              ]
            }' > payload.json

          response="$(curl -sS -w "\n%{http_code}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$webhook")"
          http_code="${response##*$'\n'}"
          response_body="${response%$'\n'*}"

          if [[ "$http_code" != "204" && "$http_code" != "200" ]]; then
            echo "Discord returned HTTP ${http_code} for ${channel_label}." >&2
            echo "${response_body}" >&2
            exit 1
          fi

  notify-merge:
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    steps:
      - name: Announce merge to Discord
        env:
          GH_TOKEN: ${{ github.token }}
          DISCORD_WEBHOOK_ANNOUNCEMENTS: ${{ secrets.DISCORD_WEBHOOK_ANNOUNCEMENTS }}
        run: |
          set -euo pipefail

          PR_NUMBER="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" --jq '.[0].number // empty')"
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No pull request associated with ${GITHUB_SHA}; skipping merge announcement."
            exit 0
          fi

          pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")"
          merged="$(echo "$pr_json" | jq -r '.merged_at // empty')"
          if [[ -z "$merged" ]]; then
            echo "PR #${PR_NUMBER} is not merged; skipping merge announcement."
            exit 0
          fi

          PR_TITLE="$(echo "$pr_json" | jq -r '.title')"
          PR_URL="$(echo "$pr_json" | jq -r '.html_url')"
          PR_USER="$(echo "$pr_json" | jq -r '.user.login')"
          PR_BODY="$(echo "$pr_json" | jq -r '.body // ""')"

          webhook="${DISCORD_WEBHOOK_ANNOUNCEMENTS:-}"
          if [[ -z "$webhook" ]]; then
            echo "DISCORD_WEBHOOK_ANNOUNCEMENTS secret is required for merge announcements on ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

          body_preview="$(printf '%s' "${PR_BODY:-}" | head -c 1000)"
          title_preview="$(printf '%s' "${PR_TITLE:-}" | head -c 256)"
          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          jq -n \
            --arg title "$title_preview" \
            --arg url "$PR_URL" \
            --arg user "$PR_USER" \
            --arg number "$PR_NUMBER" \
            --arg body "$body_preview" \
            --arg timestamp "$timestamp" \
            '{
              "username": "BubbleHub GitHub",
              "avatar_url": "https://BubbleHub.ai/logo.png",
              "embeds": [
                {
                  "title": ("✅ Merged to main: PR #" + $number),
                  "url": $url,
                  "description": $title,
                  "color": 5763719,
                  "fields": [
                    {
                      "name": "Author",
                      "value": $user,
                      "inline": true
                    },
                    {
                      "name": "Pull Request",
                      "value": ("[#" + $number + "](" + $url + ")"),
                      "inline": true
                    },
                    {
                      "name": "Description",
                      "value": (
                        if ($body | length) > 0
                        then $body
                        else "No PR description provided."
                        end
                      )
                    }
                  ],
                  "footer": {
                    "text": "BubbleHub • Merged to main"
                  },
                  "timestamp": $timestamp
                }
              ]
            }' > payload.json

          response="$(curl -sS -w "\n%{http_code}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$webhook")"
          http_code="${response##*$'\n'}"
          response_body="${response%$'\n'*}"

          if [[ "$http_code" != "204" && "$http_code" != "200" ]]; then
            echo "Discord returned HTTP ${http_code} for merge announcements." >&2
            echo "${response_body}" >&2
            exit 1
          fi
